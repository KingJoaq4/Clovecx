        <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝒞𝓁𝑜𝓋𝑒𝒸𝓍 - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="user-menu-container">
        <div class="user-icon" onclick="window.toggleMenu(event)">
            <img id="userLogo" src="logo.png" alt="Logo">
        </div>
        <div id="dropdownMenu" class="dropdown-content">
            <a href="#" id="authLink" onclick="window.gestionarSesion()">Iniciar Sesión</a>
        </div>
    </div>

    <div class="card">
        <h1 id="mainTitle">𝒞𝓁𝑜𝓋𝑒𝒸𝓍</h1>
        <p id="status">● Desconectado</p>

        <div id="login-seccion">
            <div class="welcome-box">
                <p>Bienvenido a la experiencia Premium</p>
                <button class="google-btn" onclick="window.gestionarSesion()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
                    Conectar con Google
                </button>
            </div>
        </div>

        <div id="reproductor-seccion" style="display: none;">
            <div class="player-header">
                <div class="album-art">
                    <img id="trackImg" src="logo.png" alt="Cover">
                </div>
                <div class="track-info">
                    <h2 id="songTitle">Canción</h2>
                    <p id="artistName">Cantante</p>
                </div>
            </div>

            <audio id="player" crossorigin="anonymous"></audio>

            <div class="controls-container">
                <button class="nav-btn" onclick="window.anterior()">⏮</button>
                <button id="playBtn" class="play-main" onclick="window.togglePlay()">▶</button>
                <button class="nav-btn" onclick="window.siguiente()">⏭</button>
            </div>

            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="window.setVolume(this.value)">
                <span>🔊</span>
            </div>

            <div class="progress-section">
                <div class="progress-container" onclick="window.seek(event)">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="time-labels">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="playlist-wrapper">
                <ul id="playlist"></ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbiGHKNnfEiHUpN-J8-hgS5bcbyPmr5RI",
            authDomain: "spotify-clove.firebaseapp.com",
            projectId: "spotify-clove",
            storageBucket: "spotify-clove.firebasestorage.app",
            messagingSenderId: "905403820285",
            appId: "1:905403820285:web:c6f3e72abbcaca4febf694"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        setPersistence(auth, browserSessionPersistence);

        const canciones = [
            { titulo: "M.A.I", artista: "Milo J", url: "M.A.I.mp3", img: "cover1.png", color: "#00f2ff" },
            { titulo: "Ferxxo 151", artista: "Feid", url: "Ferxxo151.mp3", img: "cover2.png", color: "#1DB954" },
            { titulo: "Columbia", artista: "Quevedo", url: "Columbia.mp3", img: "cover3.png", color: "#3498db" },
            { titulo: "Cantante", artista: "Kenny B", url: "Cantante.mp3", img: "cover4.png", color: "#bc13fe" }
        ];

        let indiceActual = 0;
        let logueado = false;
        const player = document.getElementById('player');

        onAuthStateChanged(auth, (user) => {
            const loginSec = document.getElementById('login-seccion');
            const playerSec = document.getElementById('reproductor-seccion');
            const statusTxt = document.getElementById('status');
            const userImg = document.getElementById('userLogo');
            const authLink = document.getElementById('authLink');

            if (user) {
                logueado = true;
                authLink.innerText = "Cerrar Sesión";
                userImg.src = user.photoURL || 'edited-image.jpg';
                statusTxt.innerText = "● En Línea";
                statusTxt.style.color = "var(--accent)";
                loginSec.style.display = "none";
                playerSec.style.display = "block";
                actualizarLista();
            } else {
                logueado = false;
                authLink.innerText = "Iniciar Sesión";
                userImg.src = 'edited-image.jpg';
                statusTxt.innerText = "● Desconectado";
                statusTxt.style.color = "#666";
                loginSec.style.display = "block";
                playerSec.style.display = "none";
                player.pause();
            }
        });

        window.toggleMenu = (e) => {
            if(e) e.stopPropagation();
            document.getElementById("dropdownMenu").classList.toggle("show");
        };

        window.gestionarSesion = async () => {
            if (!logueado) {
                try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); }
            } else {
                await signOut(auth);
                window.location.reload();
            }
        };

        // FUNCIÓN DE VOLUMEN
        window.setVolume = (val) => {
            player.volume = val;
        };

        window.cargarCancion = (i) => {
            indiceActual = i;
            const c = canciones[i];
            player.pause();
            player.src = c.url;
            player.load();
            
            document.getElementById('songTitle').innerText = c.titulo;
            document.getElementById('artistName').innerText = c.artista;
            document.getElementById('trackImg').src = c.img;
            document.documentElement.style.setProperty('--accent', c.color);
            
            player.play().catch(err => console.log("Esperando interacción..."));
            document.getElementById('playBtn').innerText = "⏸";
            actualizarLista();
        };

        window.togglePlay = () => {
            if (player.paused) { player.play(); document.getElementById('playBtn').innerText = "⏸"; }
            else { player.pause(); document.getElementById('playBtn').innerText = "▶"; }
        };

        window.siguiente = () => window.cargarCancion((indiceActual + 1) % canciones.length);
        window.anterior = () => window.cargarCancion((indiceActual - 1 + canciones.length) % canciones.length);

        window.seek = (e) => {
            const rect = document.querySelector('.progress-container').getBoundingClientRect();
            player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
        };

        player.ontimeupdate = () => {
            if (player.duration) {
                const pct = (player.currentTime / player.duration) * 100;
                document.getElementById('progressBar').style.width = pct + "%";
                document.getElementById('currentTime').innerText = formatTime(player.currentTime);
                document.getElementById('duration').innerText = formatTime(player.duration);
            }
        };

        function formatTime(s) {
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function actualizarLista() {
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            canciones.forEach((c, i) => {
                const li = document.createElement('li');
                li.className = `playlist-item ${i === indiceActual ? 'active' : ''}`;
                li.innerHTML = `<strong>${c.titulo}</strong><br><small>${c.artista}</small>`;
                li.onclick = () => window.cargarCancion(i);
                list.appendChild(li);
            });
        }
        
        window.onclick = () => document.getElementById("dropdownMenu").classList.remove("show");
    </script>
</body>
</html>
