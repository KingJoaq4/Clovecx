<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝒞𝓁𝑜𝓋𝑒𝒸𝓍 - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="user-menu-container">
            <div class="user-icon" onclick="window.toggleMenu()">
                <img id="userLogo" src="logo.png" alt="Logo">
            </div>
            <div id="dropdownMenu" class="dropdown-content">
                <a href="#" id="authLink" onclick="window.gestionarSesion()">Iniciar Sesión</a>
            </div>
        </div>

        <h1 id="mainTitle">𝒞𝓁𝑜𝓋𝑒𝒸𝓍</h1>
        <p id="status">● Desconectado</p>
        
        <div id="login-seccion">
            <div style="margin: 80px 0;">
                <p style="color: #ffffff; font-size: 2rem; font-weight: bold; margin-bottom: 20px;">¡Bienvenido!</p>
                <p style="color: #b3b3b3; font-size: 1.3rem; line-height: 1.8;">
                    Inicia sesión con Google para acceder a tu música en <span style="color: var(--sp-green);">Clovecx</span>.
                </p>
            </div>
        </div>

        <div id="reproductor-seccion" style="display: none;">
            <div class="song-info">
                <span id="songTitle">Selecciona una canción</span>
            </div>

            <audio id="player"></audio>

            <div class="custom-player">
                <div class="progress-container" onclick="window.seek(event)">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                
                <div class="controls">
                    <button class="nav-btn" onclick="window.anterior()">⏮</button>
                    <button id="playBtn" class="play-btn" onclick="window.togglePlay()">▶</button>
                    <button class="nav-btn" onclick="window.siguiente()">⏭</button>
                </div>
            </div>

            <div class="playlist-container">
                <h3>Tu Biblioteca</h3>
                <ul id="playlist"></ul>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getAuth, 
        signInWithPopup, 
        GoogleAuthProvider, 
        signOut, 
        onAuthStateChanged,
        setPersistence,
        browserLocalPersistence 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbiGHKNnfEiHUpN-J8-hgS5bcbyPmr5RI",
        authDomain: "spotify-clove.firebaseapp.com",
        projectId: "spotify-clove",
        storageBucket: "spotify-clove.firebasestorage.app",
        messagingSenderId: "905403820285",
        appId: "1:905403820285:web:c6f3e72abbcaca4febf694"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Aseguramos que la sesión se guarde en el navegador
    setPersistence(auth, browserLocalPersistence);

    const canciones = [
        { titulo: "M.A.I / Milo J.", url: "M.A.I.mp3", color: "#1DB954" },
        { titulo: "Ferxxo 151 / Feid", url: "Ferxxo151.mp3", color: "#3498db" },
        { titulo: "Columbia / Quevedo", url: "Columbia.mp3", color: "#e74c3c" },
        { titulo: "Cantante / Kenny B", url: "Cantante.mp3", color: "#f1c40f" }
    ];

    let indiceActual = 0;
    let logueado = false;

    // EL MONITOR: Este es el que manda. Si detecta al usuario, cambia la pantalla.
    onAuthStateChanged(auth, (user) => {
        const loginSec = document.getElementById('login-seccion');
        const playerSec = document.getElementById('reproductor-seccion');
        const statusTxt = document.getElementById('status');
        const authLink = document.getElementById('authLink');
        const userImg = document.getElementById('userLogo');

        if (user) {
            console.log("Usuario logueado:", user.displayName);
            logueado = true;
            userImg.src = user.photoURL || 'logo.jpg';
            statusTxt.innerText = "● En Línea";
            statusTxt.style.color = "#1DB954";
            authLink.innerText = "Cerrar Sesión";
            loginSec.style.display = "none";
            playerSec.style.display = "block";
            window.cargarCancion(0);
        } else {
            console.log("No hay usuario");
            logueado = false;
            userImg.src = 'logo.jpg';
            statusTxt.innerText = "● Desconectado";
            statusTxt.style.color = "#555";
            authLink.innerText = "Iniciar Sesión";
            loginSec.style.display = "block";
            playerSec.style.display = "none";
        }
    });

    window.toggleMenu = () => document.getElementById("dropdownMenu").classList.toggle("show");

    window.gestionarSesion = async () => {
        if (!logueado) {
            try {
                // Cambiamos a Popup para ver el error en tiempo real
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Error de Login:", error.code);
                alert("Error: " + error.code);
            }
        } else {
            await signOut(auth);
            window.toggleMenu();
        }
    };

    window.cargarCancion = (index) => {
        const player = document.getElementById('player');
        indiceActual = index;
        player.src = canciones[index].url;
        document.getElementById('songTitle').innerText = canciones[index].titulo;
        document.documentElement.style.setProperty('--sp-green', canciones[index].color);
        player.play().catch(e => console.log("Auto-play bloqueado por el navegador"));
        document.getElementById('playBtn').innerText = "⏸";
        actualizarLista();
    };

    // ... (Mantén tus funciones de togglePlay, siguiente, anterior, seek y formatTime)
    window.togglePlay = () => {
        const p = document.getElementById('player');
        if (p.paused) { p.play(); document.getElementById('playBtn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('playBtn').innerText = "▶"; }
    };
    window.siguiente = () => { indiceActual = (indiceActual + 1) % canciones.length; window.cargarCancion(indiceActual); };
    window.anterior = () => { indiceActual = (indiceActual - 1 + canciones.length) % canciones.length; window.cargarCancion(indiceActual); };
    function actualizarLista() {
        const list = document.getElementById('playlist');
        list.innerHTML = "";
        canciones.forEach((c, i) => {
            const li = document.createElement('li');
            li.className = `playlist-item ${i === indiceActual ? 'active' : ''}`;
            li.innerHTML = `<span>${c.titulo}</span>`;
            li.onclick = () => window.cargarCancion(i);
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
