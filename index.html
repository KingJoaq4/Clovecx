<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clove - 16th Birthday</title>
    
    <style>
        /* DISEÑO ESTILO SPOTIFY */
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: #181818;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            width: 350px;
            text-align: center;
            border: 1px solid #282828;
        }

        h1 { color: #1DB954; margin-bottom: 5px; }
        #status { color: #b3b3b3; font-size: 14px; margin-bottom: 20px; }

        .song-info { margin: 25px 0; }
        #songTitle { font-size: 20px; font-weight: bold; display: block; }
        .artist { color: #1DB954; font-size: 14px; }

        button {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        button:hover { transform: scale(1.05); background-color: #1ed760; }
        
        button.secondary {
            background-color: #333;
        }

        /* Ocultar reproductor hasta el login */
        #reproductor-seccion { display: none; }

        audio {
            width: 100%;
            margin-top: 20px;
            filter: invert(100%) hue-rotate(90deg) brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Spotify Clove</h1>
        <p id="status">🔴 Debes iniciar sesión</p>
        
        <div id="login-seccion">
            <button onclick="hacerLogin()">Iniciar Sesión</button>
        </div>

        <div id="reproductor-seccion">
            <div class="song-info">
                <span id="songTitle">Nombre de la canción</span><br>
                <span class="artist">Joaquin Edition</span>
            </div>

            <audio id="player" controls>
                <source src="" type="audio/mpeg">
            </audio>

            <div style="margin-top: 20px;">
                <button class="secondary" onclick="siguiente()">Siguiente ⏭️</button>
            </div>
        </div>
    </div>

    <script type="module">
        // IMPORTAR FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // CONFIGURACIÓN DE TU PROYECTO (Rellena con tus datos)
        const firebaseConfig = {
            apiKey: "AIzaSyCbiGHKNnfEiHUpN-J8-hgS5bcbyPmr5RI",
            authDomain: "spotify-clove.firebaseapp.com",
            projectId: "spotify-clove",
            storageBucket: "spotify-clove.firebasestorage.app",
            messagingSenderId: "905403820285",
            appId: "1:905403820285:web:c6f3e72abbcaca4febf694"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // PLAYLIST DE EJEMPLO (Ya que el storage es de pago)
        const canciones = [
    { 
        titulo: "M.A.I / Milo J.", 
        url: "M.A.I.mp3"
    },
    { 
        titulo: "Perreo Intenso (Beat)", 
        url: "https://audiopromos.com.ar/wp-content/uploads/2020/05/Reggaeton-Beat-1.mp3" 
    },
    { 
        titulo: "Urbano Latino", 
        url: "https://audiopromos.com.ar/wp-content/uploads/2020/05/Reggaeton-Beat-2.mp3" 
    }
];
        let indiceActual = 0;

        // FUNCIÓN DE LOGIN
        window.hacerLogin = async () => {
            const email = prompt("Email de usuario:");
            const pass = prompt("Contraseña:");
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('status').innerText = "🟢 Conectado";
                document.getElementById('login-seccion').style.display = "none";
                document.getElementById('reproductor-seccion').style.display = "block";
                cargarCancion(0);
            } catch (error) {
                alert("Datos incorrectos o error de conexión.");
            }
        };

        // FUNCIÓN SIGUIENTE
        window.siguiente = () => {
            indiceActual = (indiceActual + 1) % canciones.length;
            cargarCancion(indiceActual);
        };

        function cargarCancion(index) {
            const player = document.getElementById('player');
            const title = document.getElementById('songTitle');
            player.src = canciones[index].url;
            title.innerText = canciones[index].titulo;
            player.play();
        }
    </script>
</body>
</html>
