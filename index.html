<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝒞𝓁𝑜𝓋𝑒𝒸𝓍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="user-menu-container">
            <div class="user-icon" onclick="toggleMenu()">
                <img id="userLogo" src="logo.png" alt="Logo">
            </div>
            <div id="dropdownMenu" class="dropdown-content">
                <a href="#" id="authLink" onclick="gestionarSesion()">Iniciar Sesión</a>
            </div>
        </div>

        <h1>𝒞𝓁𝑜𝓋𝑒𝒸𝓍</h1>
        <p id="status" style="color: #b3b3b3;">● Desconectado</p>
        
        <div id="login-seccion">
            <div style="margin: 80px 0;">
                <p style="color: #ffffff; font-size: 2rem; font-weight: bold; margin-bottom: 20px;">¡Bienvenido!</p>
                <p style="color: #b3b3b3; font-size: 1.3rem; line-height: 1.8;">
                    Para acceder a la biblioteca de <span style="color: #1DB954;">Clovecx</span>,<br> 
                    inicia sesión en el icono superior.
                </p>
            </div>
        </div>

        <div id="reproductor-seccion" style="display: none;">
    <div class="song-info">
        <span id="songTitle">Cargando...</span>
    </div>
    <div class="playlist-container">
    <h3>Próximas canciones</h3>
    <ul id="playlist">
        </ul>
</div>

    <audio id="player"></audio>

    <div class="custom-player">
    <div class="progress-container" onclick="seek(event)">
        <div id="progressBar" class="progress-bar"></div>
    </div>
    
    <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>
    
    <div class="controls">
        <button class="nav-btn" onclick="anterior()">⏮</button>
        <button id="playBtn" class="play-btn" onclick="togglePlay()">▶</button>
        <button class="nav-btn" onclick="siguiente()">⏭</button>
    </div>
</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbiGHKNnfEiHUpN-J8-hgS5bcbyPmr5RI",
        authDomain: "spotify-clove.firebaseapp.com",
        projectId: "spotify-clove",
        storageBucket: "spotify-clove.firebasestorage.app",
        messagingSenderId: "905403820285",
        appId: "1:905403820285:web:c6f3e72abbcaca4febf694"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const canciones = [
        { titulo: "M.A.I / Milo J.", url: "M.A.I.mp3" },
        { titulo: "Ferxxo 151 / Feid", url: "Ferxxo151.mp3" },
        { titulo: "Columbia / Quevedo", url: "Columbia.mp3" },
        { titulo: "Cantante / Kenny B", url: "Cantante.mp3" }
    ];

    let indiceActual = 0;
    let usuarioLogueado = false;

    // --- FUNCIONES DE APOYO ---
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    // --- REPRODUCTOR ---
    window.cargarCancion = (index) => {
        if (!usuarioLogueado) return;
        indiceActual = index;
        
        const player = document.getElementById('player');
        const title = document.getElementById('songTitle');
        const btn = document.getElementById('playBtn');
        const durationTxt = document.getElementById('duration');

        player.src = canciones[index].url;
        title.innerText = canciones[index].titulo;

        // Cargar metadatos para obtener la duración real
        player.onloadedmetadata = () => {
            durationTxt.innerText = formatTime(player.duration);
        };

        player.play();
        btn.innerText = "⏸";
        // Función para renderizar la lista visual
function actualizarListaVisual() {
    const listElement = document.getElementById('playlist');
    listElement.innerHTML = ""; // Limpiar

    canciones.forEach((cancion, index) => {
        const li = document.createElement('li');
        li.className = `playlist-item ${index === indiceActual ? 'active' : ''}`;
        li.innerHTML = `<span>${cancion.titulo}</span><span>${index === indiceActual ? 'Reproduciendo' : ''}</span>`;
        li.onclick = () => cargarCancion(index);
        listElement.appendChild(li);
    });
}

// Modificamos cargarCancion para incluir el "tema"
const originalCargarCancion = window.cargarCancion;
window.cargarCancion = (index) => {
    indiceActual = index;
    const player = document.getElementById('player');
    const title = document.getElementById('songTitle');
    const btn = document.getElementById('playBtn');
    
    player.src = canciones[index].url;
    title.innerText = canciones[index].titulo;
    
    // CAMBIO DE TEMA: Fondo dinámico sutil
    const colors = ['#1DB954', '#3498db', '#e74c3c', '#f1c40f']; // Verde, Azul, Rojo, Amarillo
    const colorElegido = colors[index % colors.length];
    document.documentElement.style.setProperty('--sp-green', colorElegido);
    
    player.play();
    btn.innerText = "⏸";
    actualizarListaVisual();
};
    };

    window.togglePlay = () => {
        const player = document.getElementById('player');
        const btn = document.getElementById('playBtn');
        if (player.paused) {
            player.play();
            btn.innerText = "⏸";
        } else {
            player.pause();
            btn.innerText = "▶";
        }
    };

    window.siguiente = () => {
        if (!usuarioLogueado) return;
        indiceActual = (indiceActual + 1) % canciones.length;
        window.cargarCancion(indiceActual);
    };

    window.anterior = () => {
        if (!usuarioLogueado) return;
        indiceActual = (indiceActual - 1 + canciones.length) % canciones.length;
        window.cargarCancion(indiceActual);
    };

    window.seek = (event) => {
        const player = document.getElementById('player');
        const rect = event.currentTarget.getBoundingClientRect();
        const x = event.clientX - rect.left;
        player.currentTime = (x / rect.width) * player.duration;
    };

    // --- EVENTO DE ACTUALIZACIÓN ---
    document.getElementById('player').ontimeupdate = function() {
        const player = document.getElementById('player');
        const progress = document.getElementById('progressBar');
        const currentTxt = document.getElementById('currentTime');

        if (player.duration) {
            const percentage = (player.currentTime / player.duration) * 100;
            progress.style.width = percentage + "%";
            currentTxt.innerText = formatTime(player.currentTime);
        }
    };

    // --- GESTIÓN DE SESIÓN ---
    window.toggleMenu = () => {
        document.getElementById("dropdownMenu").classList.toggle("show");
    }

    window.gestionarSesion = () => {
        if (!usuarioLogueado) {
            hacerLogin();
        } else {
            cerrarSesion();
        }
        window.toggleMenu();
    }

    window.hacerLogin = async () => {
        const email = prompt("Email:");
        const pass = prompt("Contraseña:");
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            usuarioLogueado = true;
            
            document.getElementById('status').innerText = "● En Línea";
            document.getElementById('status').style.color = "#1DB954";
            document.getElementById('login-seccion').style.display = "none";
            document.getElementById('reproductor-seccion').style.display = "block";
            document.getElementById('authLink').innerText = "Cerrar Sesión";
            
            window.cargarCancion(0);
        } catch (error) {
            alert("Credenciales incorrectas.");
        }
    };

    window.cerrarSesion = () => {
        signOut(auth).then(() => {
            usuarioLogueado = false;
            location.reload();
        });
    }

    window.onclick = (event) => {
        if (!event.target.matches('.user-icon') && !event.target.matches('.user-icon img')) {
            document.getElementById("dropdownMenu").classList.remove("show");
        }
    }
</script>
</body>
</html>
